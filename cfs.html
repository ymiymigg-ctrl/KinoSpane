<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Майн</title>
</head>
<style>
    body {
        margin: 0;
    }
    .box {
        width: 240px;
        padding: 3px 44px 4px 16px;  /* 4 тапшырма */
        border: 3px solid rgb(9, 218, 30);
        margin: 100px;
        background-color: rgb(61, 21, 192);
    }

/* 2 тапшырма */
    .box1, .box2 {
        margin: 10px;
        width: 150px;
        padding: 10px;
        border: 2px solid rgb(22, 61, 159);
        margin-bottom: 100px;
    }

    .box1 {
        box-sizing: content-box;
    }

    .box2 {
        box-sizing: border-box;
    }

/* 3 тапшырма */
    .block {
        width: 80px;
        height: 30px;
        background-color: coral;
        margin: 30px;
    }

/* 1 задание */
    .tov {
        width: 140px;
        padding: 15px;
        border: 3px solid gray;
        margin: 20px;
        background-color: rgb(16, 69, 116);
        color: burlywood;
    }
    
    .tov p {
        color: aqua;
    }
</style>
<body>

    <div class="box">
        <h1>CSS МИГЫСФ</h1>
    </div>

    <div class="box1"><h2>yyugyg</h2></div>
    <div class="box2"><h2>ygugugugu</h2></div>

    <div class="block"><h2>124124</h2></div>
    <div class="block"><h2>1233</h2></div>


    <div class="tov">
        <h2>Фудбольный топ</h2>
        <p>1. svsrnlrlnv</p>
        <p>2. svsrnlrlnv</p>
        <p>Цена: 600сом</p>
    </div>
</body>
</html>
